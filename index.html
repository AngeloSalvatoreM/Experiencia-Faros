<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAROS | Experiencia Interactiva</title>
    <meta
      name="description"
      content="Experiencia inmersiva FAROS construida como una narrativa continua con GSAP."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <div class="ambient ambient-a"></div>
      <div class="ambient ambient-b"></div>
      <div class="space-grid"></div>

      <section class="experience" id="experience">
        <div class="intro-overlay" id="introOverlay">
          <p class="eyebrow intro-eyebrow">Experiencia Interactiva</p>

          <button class="logo-gateway" id="enterFaros" aria-label="Entrar a FAROS">
            <span class="logo-mark" aria-hidden="true">
              <span class="logo-core"></span>
              <span class="logo-ring logo-ring-a"></span>
              <span class="logo-ring logo-ring-b"></span>
              <span class="logo-beam beam-top"></span>
              <span class="logo-beam beam-right"></span>
              <span class="logo-beam beam-bottom"></span>
              <span class="logo-beam beam-left"></span>
            </span>
            <span class="logo-copy">
              <span class="brand">FAROS</span>
              <span class="tagline">Entrar para transformar la operación</span>
            </span>
          </button>
        </div>

        <div class="experience-stage" id="experienceStage">
          <header class="scene-copy" id="sceneCopy">
            <p class="eyebrow" id="sceneEyebrow">Servicios FAROS</p>
            <h1 class="scene-title" id="sceneTitle">Una red, cinco caminos, una sola operación con foco.</h1>
            <p class="scene-phase" id="scenePhase">Mapa</p>
          </header>

          <button class="back-button is-hidden" id="backToMap" type="button">Volver al mapa</button>

          <div class="stage-ornaments" aria-hidden="true">
            <span class="orbit orbit-a"></span>
            <span class="orbit orbit-b"></span>
            <span class="orbit orbit-c"></span>
          </div>

          <svg class="network-svg" viewBox="0 0 1000 1000" aria-hidden="true">
            <defs>
              <radialGradient id="hubGlow" cx="50%" cy="50%" r="60%">
                <stop offset="0%" stop-color="#C6A66B" stop-opacity="0.7" />
                <stop offset="70%" stop-color="#A2854E" stop-opacity="0.08" />
                <stop offset="100%" stop-color="#A2854E" stop-opacity="0" />
              </radialGradient>
            </defs>
            <circle class="hub-glow" cx="500" cy="500" r="118" fill="url(#hubGlow)"></circle>
            <g id="servicePaths"></g>
          </svg>

          <div class="map-layer" id="mapLayer">
            <div class="hub-anchor" id="hubAnchor"></div>
            <div class="service-nodes" id="serviceNodes"></div>
          </div>

          <div class="story-layer" id="storyLayer">
            <div class="hero-message" id="heroMessage"></div>
            <div class="diagnostic-cloud" id="diagnosticCloud"></div>
            <div class="result-message" id="resultMessage"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
